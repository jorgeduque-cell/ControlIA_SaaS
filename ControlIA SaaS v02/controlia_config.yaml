# ControlIA - Configuration File
# Sistema de IA/ML Enterprise para Agentes Empresariales

version: "1.0"
environment: production

# ============================================
# INFRASTRUCTURE CONFIGURATION
# ============================================
infrastructure:
  cloud_provider: aws
  region: us-east-1
  
  kubernetes:
    cluster_name: controlia-production
    node_pools:
      general:
        instance_type: m6i.xlarge
        min_nodes: 3
        max_nodes: 20
      gpu:
        instance_type: g4dn.xlarge
        min_nodes: 0
        max_nodes: 10
        gpu_enabled: true

# ============================================
# DATABASE CONFIGURATION
# ============================================
databases:
  postgresql:
    host: ${POSTGRES_HOST}
    port: 5432
    database: controlia
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    pool_size: 20
    extensions:
      - pgvector
      - pg_stat_statements
    
  redis:
    host: ${REDIS_HOST}
    port: 6379
    password: ${REDIS_PASSWORD}
    db: 0
    ssl: true
    
  pinecone:
    api_key: ${PINECONE_API_KEY}
    environment: us-east-1
    index_name: controlia-knowledge
    dimension: 1536
    metric: cosine
    
  neo4j:
    uri: ${NEO4J_URI}
    username: ${NEO4J_USER}
    password: ${NEO4J_PASSWORD}
    database: controlia

# ============================================
# LLM PROVIDERS CONFIGURATION
# ============================================
llm_providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    organization: ${OPENAI_ORG}
    models:
      gpt-4o:
        name: "gpt-4o-2024-08-06"
        context_window: 128000
        max_output_tokens: 16384
        input_cost_per_1k: 0.005
        output_cost_per_1k: 0.015
        tier: premium
      gpt-4o-mini:
        name: "gpt-4o-mini-2024-07-18"
        context_window: 128000
        max_output_tokens: 16384
        input_cost_per_1k: 0.00015
        output_cost_per_1k: 0.0006
        tier: standard
      text-embedding-3-large:
        name: "text-embedding-3-large"
        dimension: 3072
        cost_per_1k: 0.00013
      text-embedding-3-small:
        name: "text-embedding-3-small"
        dimension: 1536
        cost_per_1k: 0.00002
        
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    models:
      claude-3-5-sonnet:
        name: "claude-3-5-sonnet-20241022"
        context_window: 200000
        max_output_tokens: 8192
        input_cost_per_1k: 0.003
        output_cost_per_1k: 0.015
        tier: premium
      claude-3-haiku:
        name: "claude-3-haiku-20240307"
        context_window: 200000
        max_output_tokens: 4096
        input_cost_per_1k: 0.00025
        output_cost_per_1k: 0.00125
        tier: economic
        
  local_models:
    enabled: true
    ollama_host: ${OLLAMA_HOST}
    models:
      llama3-70b:
        name: "llama3:70b"
        context_window: 8192
        quantization: "Q4_K_M"
        gpu_required: true
        gpu_memory: "40GB"
      mistral-7b:
        name: "mistral:7b"
        context_window: 32768
        quantization: "Q5_K_M"
        gpu_required: true
        gpu_memory: "8GB"

# ============================================
# LLM ROUTER CONFIGURATION
# ============================================
llm_router:
  default_strategy: cost_optimized
  
  strategies:
    cost_optimized:
      description: "Minimiza costos manteniendo calidad aceptable"
      routing_rules:
        - condition: "token_count < 1000 AND complexity < 0.5"
          model: "gpt-4o-mini"
        - condition: "task_type == 'classification'"
          model: "mistral-7b"
        - condition: "complexity > 0.8"
          model: "gpt-4o"
        - default: "gpt-4o-mini"
          
    quality_optimized:
      description: "Máxima calidad sin importar costo"
      routing_rules:
        - condition: "task_type == 'coding'"
          model: "claude-3-5-sonnet"
        - condition: "task_type == 'analysis'"
          model: "gpt-4o"
        - default: "claude-3-5-sonnet"
          
    latency_optimized:
      description: "Respuesta rápida para UX en tiempo real"
      routing_rules:
        - condition: "streaming == true"
          model: "gpt-4o-mini"
        - condition: "response_time_sla < 2s"
          model: "claude-3-haiku"
        - default: "gpt-4o-mini"
  
  fallback_chain:
    - primary_model
    - secondary_model
    - gpt-4o-mini
    - mistral-7b
    
  caching:
    enabled: true
    ttl_seconds: 3600
    similarity_threshold: 0.95
    max_entries: 100000

# ============================================
# MEMORY CONFIGURATION
# ============================================
memory:
  context_window:
    max_tokens: 4000
    reserve_tokens_for_response: 1000
    
  working_memory:
    backend: redis
    ttl_hours: 24
    max_size_mb: 10
    compression:
      enabled: true
      trigger_tokens: 8000
      method: summarization
      
  long_term_memory:
    backend: pinecone
    embedding_model: "text-embedding-3-large"
    top_k: 10
    similarity_threshold: 0.7
    
  knowledge_graph:
    enabled: true
    backend: neo4j
    entity_extraction_model: "gpt-4o-mini"
    max_depth: 3

# ============================================
# RAG CONFIGURATION
# ============================================
rag:
  chunking:
    default_strategy: semantic
    strategies:
      fixed_size:
        chunk_size: 512
        chunk_overlap: 100
        separator: "\n\n"
      semantic:
        similarity_threshold: 0.85
        min_chunk_size: 100
        max_chunk_size: 1000
      recursive:
        separators: ["\n## ", "\n### ", "\n\n", "\n", ". ", " "]
        chunk_size: 500
        chunk_overlap: 50
        
  retrieval:
    top_k: 10
    similarity_threshold: 0.7
    
  reranking:
    enabled: true
    model: "cohere/rerank-v3"
    top_k: 5
    
  hybrid_search:
    enabled: true
    vector_weight: 0.7
    keyword_weight: 0.3

# ============================================
# TOOLS CONFIGURATION
# ============================================
tools:
  registry:
    auto_discovery: true
    max_tools_per_agent: 20
    
  execution:
    timeout_seconds: 30
    max_retries: 3
    sandbox_level: container
    
  built_in:
    - web_search
    - web_scrape
    - query_database
    - send_email
    - send_slack
    - send_whatsapp
    - create_lead
    - update_contact
    - generate_image
    - transcribe_audio
    
  mcp:
    enabled: true
    servers: []

# ============================================
# WORKFLOW CONFIGURATION
# ============================================
workflows:
  engine:
    max_steps: 50
    timeout_minutes: 30
    
  human_in_the_loop:
    enabled: true
    default_timeout_hours: 24
    notification_channels:
      - telegram
      - email
      - slack

# ============================================
# GUARDRAILS CONFIGURATION
# ============================================
guardrails:
  input_validation:
    enabled: true
    max_input_length: 10000
    block_prompt_injection: true
    injection_threshold: 0.8
    
  pii_detection:
    enabled: true
    redact_in_output: true
    allowed_in_input: false
    entities:
      - email
      - phone
      - ssn
      - credit_card
      - address
      
  content_moderation:
    enabled: true
    categories:
      - hate
      - harassment
      - self-harm
      - sexual
      - violence
      
  output_filtering:
    enabled: true
    hallucination_detection: true
    hallucination_threshold: 0.7

# ============================================
# RATE LIMITING CONFIGURATION
# ============================================
rate_limiting:
  enabled: true
  
  tiers:
    free:
      requests_per_minute: 10
      requests_per_hour: 100
      tokens_per_day: 10000
    pro:
      requests_per_minute: 60
      requests_per_hour: 1000
      tokens_per_day: 100000
    enterprise:
      requests_per_minute: 300
      requests_per_hour: 10000
      tokens_per_day: 1000000

# ============================================
# OBSERVABILITY CONFIGURATION
# ============================================
observability:
  logging:
    level: info
    format: json
    destination: loki
    
  metrics:
    enabled: true
    destination: prometheus
    scrape_interval_seconds: 15
    
  tracing:
    enabled: true
    destination: tempo
    sample_rate: 0.1
    
  llm_tracing:
    enabled: true
    destination: langfuse
    log_prompts: true
    log_responses: true
    
  cost_tracking:
    enabled: true
    alert_threshold_daily: 100
    
  alerts:
    channels:
      - slack
      - email
    conditions:
      - name: high_latency
        metric: p95_latency
        threshold: 5000
        duration: 5m
      - name: high_error_rate
        metric: error_rate
        threshold: 0.05
        duration: 5m
      - name: high_cost
        metric: daily_cost
        threshold: 100
        duration: 1h

# ============================================
# SECURITY CONFIGURATION
# ============================================
security:
  authentication:
    method: jwt
    token_expiry_hours: 24
    refresh_token_expiry_days: 30
    
  authorization:
    method: rbac
    roles:
      - admin
      - manager
      - agent
      - viewer
      
  encryption:
    at_rest: aes-256
    in_transit: tls-1.3
    
  secrets:
    manager: aws_secrets_manager
    rotation_days: 90

# ============================================
# FINE-TUNING CONFIGURATION
# ============================================
fine_tuning:
  enabled: true
  
  data_collection:
    min_interactions_for_training: 1000
    quality_threshold: 0.8
    
  training:
    validation_split: 0.2
    max_training_time_hours: 24
    
  evaluation:
    benchmarks:
      - mt-bench
      - custom-crm-benchmark
    min_improvement_threshold: 0.05

# ============================================
# FEATURE FLAGS
# ============================================
features:
  multi_agent: true
  workflows: true
  knowledge_graph: true
  mcp_integration: true
  fine_tuning: true
  human_in_the_loop: true
  local_models: true
  advanced_rag: true
  a_b_testing: true
