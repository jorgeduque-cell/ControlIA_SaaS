# Python script to run validations programmatically
# scripts/run_validations.py

import great_expectations as gx
import sys
import logging

logging.basicConfig(level=logging.INFO)
logger = logging.getLogger(__name__)

def run_checkpoint(checkpoint_name: str) -> bool:
    """Run a Great Expectations checkpoint"""
    context = gx.get_context()
    
    checkpoint = context.get_checkpoint(name=checkpoint_name)
    checkpoint_result = checkpoint.run()
    
    if checkpoint_result.success:
        logger.info(f"✅ Checkpoint '{checkpoint_name}' passed")
        return True
    else:
        logger.error(f"❌ Checkpoint '{checkpoint_name}' failed")
        
        # Log validation failures
        for validation_result in checkpoint_result.list_validation_results():
            if not validation_result.success:
                logger.error(f"  - {validation_result.expectation_config.expectation_type}: FAILED")
        
        return False

def run_all_checkpoints():
    """Run all configured checkpoints"""
    checkpoints = [
        "daily_metrics_checkpoint",
        "conversations_checkpoint",
        "users_checkpoint"
    ]
    
    results = []
    for checkpoint_name in checkpoints:
        success = run_checkpoint(checkpoint_name)
        results.append((checkpoint_name, success))
    
    # Summary
    logger.info("\n" + "="*50)
    logger.info("VALIDATION SUMMARY")
    logger.info("="*50)
    
    for checkpoint_name, success in results:
        status = "✅ PASS" if success else "❌ FAIL"
        logger.info(f"{status}: {checkpoint_name}")
    
    # Exit with error if any checkpoint failed
    if not all(success for _, success in results):
        sys.exit(1)

if __name__ == "__main__":
    if len(sys.argv) > 1:
        checkpoint_name = sys.argv[1]
        success = run_checkpoint(checkpoint_name)
        sys.exit(0 if success else 1)
    else:
        run_all_checkpoints()
