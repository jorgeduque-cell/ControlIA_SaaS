# profilers/daily_metrics_profiler.yml
name: daily_metrics_profiler
config_version: 1.0
rules:
  column_cardinality_rule:
    domain_builder:
      class_name: TableDomainBuilder
    parameter_builders:
      - name: column_distinct_values_count
        class_name: ColumnDistinctValuesCount
    expectation_configuration_builders:
      - expectation_type: expect_column_unique_value_count_to_be_between
        class_name: DefaultExpectationConfigurationBuilder
        validation_parameter_builder_configs:
          - parameter_name: column_distinct_values_count
            expectation_type: expect_column_unique_value_count_to_be_between
        min_value: $parameter.column_distinct_values_count.value[0.25]
        max_value: $parameter.column_distinct_values_count.value[0.75]
        meta:
          profiler_details:
            parameter_builder_configs:
              - parameter_name: column_distinct_values_count

  numeric_columns_rule:
    domain_builder:
      class_name: ColumnDomainBuilder
      include_column_name_suffixes:
        - "_count"
        - "_ms"
        - "_rate"
        - "_score"
    parameter_builders:
      - name: min
        class_name: NumericMetricRangeMultiBatchParameterBuilder
        metric_name: column.min
        metric_multi_batch_parameter_builder_name: column_min_range
      - name: max
        class_name: NumericMetricRangeMultiBatchParameterBuilder
        metric_name: column.max
        metric_multi_batch_parameter_builder_name: column_max_range
    expectation_configuration_builders:
      - expectation_type: expect_column_values_to_be_between
        class_name: DefaultExpectationConfigurationBuilder
        column: $domain.domain_kwargs.column
        min_value: $parameter.min.value[0]
        max_value: $parameter.max.value[1]
        mostly: 0.95

