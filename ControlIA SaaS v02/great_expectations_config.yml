# checkpoints/daily_metrics_checkpoint.yml
name: daily_metrics_checkpoint
config_version: 1.0
template_name:
module_name: great_expectations.checkpoint
class_name: Checkpoint
run_name_template: "%Y%m%d-%H%M%S-daily-metrics"
expectation_suite_name: daily_metrics_suite
batch_request:
  datasource_name: snowflake_datasource
  data_asset_name: analytics.daily_metrics
action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
  - name: send_slack_notification
    action:
      class_name: SlackNotificationAction
      slack_webhook: ${SLACK_WEBHOOK_URL}
      notify_on: failure
      renderer:
        module_name: great_expectations.render.renderer.slack_renderer
        class_name: SlackRenderer
  - name: send_email_on_failure
    action:
      class_name: EmailAction
      smtp_address: ${SMTP_SERVER}
      smtp_port: 587
      sender_login: ${SMTP_USER}
      sender_password: ${SMTP_PASSWORD}
      receiver_emails: data-alerts@controlia.com
      notify_on: failure
      use_tls: true

