# dbt_project.yml - ControlIA Analytics
# Data Build Tool configuration

name: 'controlia_analytics'
version: '1.0.0'
config-version: 2

# Profile to use from profiles.yml
profile: 'controlia_snowflake'

# Paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations
models:
  controlia_analytics:
    # Staging models - views on raw data
    staging:
      +materialized: view
      +schema: staging
      +snowflake_warehouse: ETL_WH
      +tags: ['staging', 'daily']
    
    # Intermediate models - cleaned and transformed
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
      +snowflake_warehouse: ETL_WH
      +tags: ['intermediate']
    
    # Marts - business-level aggregations
    marts:
      +materialized: table
      +schema: analytics
      +snowflake_warehouse: BI_WH
      +transient: false
      +tags: ['marts', 'analytics']
      
      core:
        +tags: ['core', 'daily']
        +cluster_by: ['date', 'tenant_id']
      
      ml:
        +materialized: table
        +tags: ['ml', 'features']
        +cluster_by: ['tenant_id', 'created_at']
    
    # Reporting - pre-aggregated for dashboards
    reporting:
      +materialized: incremental
      +schema: reporting
      +snowflake_warehouse: BI_WH
      +tags: ['reporting', 'dashboards']
      +incremental_strategy: merge
      +unique_key: ['report_date', 'tenant_id']

# Seed configurations
seeds:
  controlia_analytics:
    +schema: reference
    +snowflake_warehouse: ETL_WH
    +tags: ['reference', 'seeds']

# Snapshot configurations
snapshots:
  controlia_analytics:
    +target_schema: snapshots
    +snowflake_warehouse: ETL_WH
    +tags: ['snapshots', 'scd']

# Test configurations
tests:
  controlia_analytics:
    +store_failures: true
    +schema: test_failures

# On-run hooks
on-run-start:
  - "{{ log('Starting dbt run for ControlIA Analytics', info=True) }}"
  - "CREATE SCHEMA IF NOT EXISTS {{ target.schema }}"

on-run-end:
  - "{{ log('Completed dbt run for ControlIA Analytics', info=True) }}"
  - "{{ grant_select_on_schemas(schemas, 'CONTROLIA_ANALYTICS_ROLE') }}"

# Query comments
query-comment:
  comment: '{{ dbt_version }}|{{ invocation_id }}|{{ model.name }}'
  append: true

# Flags
flags:
  send_anonymous_usage_stats: false
  use_colors: true
